[identity]
name = "REDos 8 (aarch64)"
family = "rhel"

[buildroot]
base-packages = [
    "rpm-build",
    "redhat-rpm-config",
    "gcc",
    "make",
    "bash",
    "coreutils",
    "findutils",
    "sed",
    "tar",
    "gzip",
]

# Vendor-internal RHEL-family rebuild — no public mirror. Configure
# your internal repo under `[profiles."redos-8-aarch64".repos]`:
#
#   [repos.os]
#   baseurl  = "https://internal-mirror.example/8/$basearch/os/"
#   kind     = "rpm-md"
#   enabled  = true
#   priority = 10
#   role     = "base"
