[identity]
name = "MOSos 15 (x86_64)"

[buildroot]
base-packages = [
    "rpm-build",
    "gcc",
    "make",
    "bash",
    "coreutils",
    "findutils",
    "sed",
    "tar",
    "gzip",
]

