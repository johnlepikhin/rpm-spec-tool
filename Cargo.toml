[workspace]
resolver = "2"
members = [
    "crates/analyzer",
    "crates/cli",
]

[workspace.package]
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
authors      = ["Evgenii Lepikhin <johnlepikhin@gmail.com>"]
repository   = "https://github.com/johnlepikhin/rpm-spec-tool"

[workspace.dependencies]
rpm-spec   = { path = "../rpm-spec", features = ["parser", "printer", "serde"] }
anyhow     = "1"
thiserror  = "2"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
toml       = "0.8"
tracing    = "0.1"
